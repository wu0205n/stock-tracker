<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>庫藏追蹤系統</title>
    <link rel="manifest" href="./manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #1a73e8; --bg: #f8f9fa; --red: #d32f2f; --green: #2e7d32; --orange: #e67e22; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 500px; }
        .dashboard { background: linear-gradient(135deg, #1a73e8, #2890ff); color: white; padding: 20px; border-radius: 16px; margin-bottom: 20px; display: none; }
        .add-section { background: white; padding: 20px; border-radius: 16px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; display: flex; flex-direction: column; gap: 12px; }
        input { padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; outline: none; }
        .btn-add { background: var(--primary); color: white; border: none; padding: 14px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .stock-card { background: white; padding: 15px; border-radius: 15px; margin-bottom: 15px; border-left: 6px solid var(--orange); box-shadow: 0 2px 6px rgba(0,0,0,0.05); }
        .card-header { display: flex; justify-content: space-between; align-items: center; }
        .price-val { font-size: 22px; font-weight: bold; }
        .pnl-row { text-align: right; font-weight: bold; font-size: 19px; margin-top: 10px; }
        .btn-del { background: #fff1f1; color: var(--red); border: none; padding: 5px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; margin-top: 10px; }
        .chart-box { background: white; margin-top: 15px; padding: 10px; border-radius: 12px; }
        .loading { text-align: center; color: #888; padding: 40px; }
    </style>
</head>
<body>
    <div class="container">
        <header><h1 style="color:var(--primary); text-align:center;">庫藏追蹤系統</h1></header>
        
        <div id="dashboard" class="dashboard">
            <div style="display:flex; justify-content:space-between"><span>總成本(含稅費)</span><span id="tCost">0</span></div>
            <div style="display:flex; justify-content:space-between; margin-top:5px;"><span>現值(預扣稅費)</span><span id="tVal">0</span></div>
            <div style="border-top:1px solid rgba(255,255,255,0.3); margin-top:12px; padding-top:12px;">
                <div id="tPnl" style="font-size:24px; font-weight:bold; text-align:right;">計算中...</div>
            </div>
            <div class="chart-box" id="cb" style="display:none;"><canvas id="pChart"></canvas></div>
        </div>

        <div class="add-section">
            <div style="display:flex; gap:10px;"><input type="text" id="sym" placeholder="代碼" style="flex:1;"><input type="text" id="nam" placeholder="名稱" style="flex:1.5;"></div>
            <div style="display:flex; gap:10px;"><input type="number" id="cst" placeholder="單價" style="flex:1;"><input type="number" id="shr" placeholder="股數" style="flex:1;"></div>
            <button class="btn-add" onclick="doAdd()">加入庫藏清單</button>
        </div>

        <div id="list"></div>
    </div>

<script>
    // ⚠️ 務必替換為你最新的 Google Apps Script 網址
    const API_URL = "https://script.google.com/macros/s/AKfycby9L6QFGoMMz0Vl3senZbrQfLBCgMd53kQM6WcQcMPDenfzhF54UhviK91shrPqW0JB/exec";
    let chart = null;

    async function load() {
        const div = document.getElementById('list');
        div.innerHTML = '<div class="loading">正在獲取雲端報價...</div>';
        try {
            const res = await fetch(API_URL);
            const stocks = await res.json();
            render(stocks);
        } catch (e) { div.innerHTML = '<div class="loading" style="color:red;">載入失敗，請確認 API 部署網址。</div>'; }
    }

    function render(stocks) {
        const div = document.getElementById('list');
        div.innerHTML = '';
        let tc = 0, tv = 0, lbs = [], vls = [];

        if (stocks.length === 0) {
            div.innerHTML = '<div class="loading">目前無持股紀錄</div>';
            document.getElementById('dashboard').style.display = 'none';
            return;
        }

        stocks.forEach(s => {
            const curP = parseFloat(s.price);
            const card = document.createElement('div');
            card.className = 'stock-card';
            
            let bodyContent = '<div style="color:#888; font-size:14px; margin-top:10px;">報價更新中...</div>';
            
            if (!isNaN(curP)) {
                // 國泰證券邏輯：手續費 28 折，最低 1 元
                const rC = s.cost * s.shares;
                const rV = curP * s.shares;
                const bF = Math.max(1, Math.floor(rC * 0.001425 * 0.28));
                const nC = Math.floor(rC) + bF;
                const sF = Math.max(1, Math.floor(rV * 0.001425 * 0.28));
                const sT = Math.floor(rV * 0.003);
                const nV = Math.floor(rV) - sF - sT;
                const pnl = nV - nC;
                const per = (pnl / nC) * 100;
                
                tc += nC; tv += nV;
                lbs.push(s.name); vls.push(nV);

                bodyContent = `
                    <div style="margin-top:12px; border-top:1px dashed #eee; padding-top:12px;">
                        <div style="display:flex; justify-content:space-between; font-size:14px; color:#666;">
                            <span>成本: ${nC.toLocaleString()}</span><span>現值: ${nV.toLocaleString()}</span>
                        </div>
                        <div class="pnl-row" style="color:${pnl >= 0 ? 'var(--red)' : 'var(--green)'}">
                            ${pnl >= 0 ? '+' : ''}${pnl.toLocaleString()} (${pnl >= 0 ? '+' : ''}${per.toFixed(2)}%)
                        </div>
                    </div>`;
            }

            card.innerHTML = `
                <div class="card-header">
                    <div><b style="font-size:18px;">${s.symbol}</b><br><small style="color:#777;">${s.name}</small></div>
                    <div class="price-val">${s.price}</div>
                </div>
                ${bodyContent}
                <button class="btn-del" onclick="doDel(${s.rowIndex})">刪除</button>`;
            div.appendChild(card);
        });
        updateDash(tc, tv, lbs, vls);
    }

    function updateDash(tc, tv, lbs, vls) {
        const dash = document.getElementById('dashboard');
        if (tc === 0) { dash.style.display = 'none'; return; }
        const pnl = tv - tc, per = (pnl / tc) * 100;
        document.getElementById('tCost').innerText = tc.toLocaleString();
        document.getElementById('tVal').innerText = tv.toLocaleString();
        document.getElementById('tPnl').innerText = `${pnl >= 0 ? '+' : ''}${pnl.toLocaleString()} (${pnl >= 0 ? '+' : ''}${per.toFixed(2)}%)`;
        dash.style.background = pnl >= 0 ? 'linear-gradient(135deg, #d32f2f, #f44336)' : 'linear-gradient(135deg, #2e7d32, #4caf50)';
        dash.style.display = 'block';
        if (vls.length > 0) drawChart(lbs, vls);
    }

    function drawChart(lbs, vls) {
        document.getElementById('cb').style.display = 'block';
        const ctx = document.getElementById('pChart').getContext('2d');
        if (chart) chart.destroy();
        chart = new Chart(ctx, {
            type: 'doughnut',
            data: { labels: lbs, datasets: [{ data: vls, backgroundColor: ['#FF6384','#36A2EB','#FFCE56','#4BC0C0','#9966FF','#FF9F40'] }] },
            options: { plugins: { legend: { position: 'bottom', labels: { boxWidth: 12 } } } }
        });
    }

    async function doAdd() {
        const btn = document.getElementById('addBtn');
        const data = {
            action: "add", category: "台股",
            symbol: document.getElementById('sym').value.trim(),
            name: document.getElementById('nam').value.trim(),
            cost: document.getElementById('cst').value,
            shares: document.getElementById('shr').value
        };
        if (!data.symbol) return alert('代碼必填');
        await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
        document.getElementById('sym').value = ''; document.getElementById('nam').value = '';
        setTimeout(load, 1500);
    }

    async function doDel(row) {
        if (!confirm('確定刪除？')) return;
        await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: "delete", rowIndex: row }) });
        setTimeout(load, 1500);
    }

    load();
</script>
</body>
</html>
